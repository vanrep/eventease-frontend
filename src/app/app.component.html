<!-- Barra de navegacion principal -->
<app-navbar></app-navbar>

<!-- Contenedor principal: carga el componente segun la ruta activa -->
<!-- Si estamos en inicio activa el scroll tipo snap, si es pagina de auth aplica estilo especial -->
<main [class.snap-active]="isMainPage" [class.auth-page]="isAuthPage">
  <!-- Aqui se renderiza el componente de la ruta actual -->
  <router-outlet></router-outlet>
</main>

<!-- Pie de pagina -->
<!-- Se oculta en la pagina de inicio -->
<!-- Cambia entre el estilo normal y el estilo compacto segun la ruta -->
<footer *ngIf="!isMainPage" [class.site-footer]="!isAuthPage" [class.auth-footer]="isAuthPage">

  <!-- Enlaces legales -->
  <nav aria-label="Enlaces legales">
    <ul class="footer-links">
      <li><a href="#">Política de cookies</a></li>
      <li><a href="#">Privacidad</a></li>
      <li><a routerLink="/about-us">Conócenos</a></li>
    </ul>
  </nav>

  <!-- Iconos de redes sociales -->
  <div class="social" aria-label="Redes sociales">
    <a href="https://www.facebook.com/" aria-label="Facebook">
      <i class="fa-brands fa-facebook" aria-hidden="true"></i>
    </a>
    <a href="https://www.instagram.com/" aria-label="Instagram">
      <i class="fa-brands fa-instagram" aria-hidden="true"></i>
    </a>
    <a href="https://x.com/" aria-label="X (Twitter)">
      <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
    </a>
  </div>
</footer>

<!-- Boton flotante para volver al inicio de la pagina -->
<!-- Solo se muestra cuando el usuario ha bajado por la pagina -->
<button class="fab-top" [class.visible]="btnSubir" (click)="scrollToTop()" aria-label="Volver arriba">
  <!-- Icono de flecha hacia arriba -->
  <i class="fa fa-chevron-up" aria-hidden="true"></i>
</button>
