<!-- Pagina para crear un evento nuevo -->
<section class="seccion">
  <div class="contenedor">

    <!-- Formulario principal -->
    <form (ngSubmit)="guardar()">

      <!-- Bloque con el nombre del evento -->
      <div class="form-header">
        <div class="grupo full-width">
          <label for="titulo">
            <i class="fa-solid fa-pen-nib"></i>
            NOMBRE DEL EVENTO
          </label>
          <input type="text" id="titulo" name="titulo" placeholder="Ej: Gran Gala de Aniversario"
            [(ngModel)]="evento.titulo" required>
        </div>
      </div>

      <!-- Campo para la descripcion -->
      <div class="grupo full-width separador section-gap">
        <label for="descripcion">
          <i class="fa-solid fa-align-left"></i>
          DESCRIPCIÓN DEL EVENTO
        </label>
        <textarea id="descripcion" name="descripcion" placeholder="Escribe aquí todos los detalles de tu celebración..."
          [(ngModel)]="evento.descripcion" rows="4">
        </textarea>
      </div>

      <!-- Bloque con fecha y capacidad -->
      <div class="grid form-grid">
        <!-- Fecha y hora del evento -->
        <div class="info-card">
          <label for="fecha">
            <i class="fa-solid fa-calendar-check"></i>
            ¿CUÁNDO SERÁ?
          </label>
          <input type="datetime-local" id="fecha" name="fecha" class="info-input" [(ngModel)]="evento.fecha"
            [min]="minFecha" required>
        </div>

        <!-- Numero de asistentes -->
        <div class="info-card">
          <label for="capacidad">
            <i class="fa-solid fa-users-line"></i>
            ¿CUÁNTOS ASISTIRÁN?
          </label>
          <input type="number" id="capacidad" name="capacidad" class="info-input" placeholder="Ej: 50"
            [(ngModel)]="evento.capacidad" [min]="0" required>
        </div>
      </div>

      <!-- Zona para elegir el lugar -->
      <div class="grupo">
        <label>
          <i class="fa-solid fa-map-location-dot"></i>
          SELECCIÓN DE LUGAR
        </label>

        <div class="seleccion-lugares">
          <!-- Lista de lugares disponibles -->
          <div class="lista-lugares">
            <div class="lugar-item" *ngFor="let lugar of lugares" [class.selected]="lugarSeleccionado?.id === lugar.id"
              (click)="seleccionarLugar(lugar)">
              <h4>{{ lugar.nombre }}</h4>
              <p>{{ lugar.direccion }}</p>
            </div>
          </div>

          <!-- Mapa para ver los lugares -->
          <div class="mapa contenedor-mapa" leaflet [leafletOptions]="options" (leafletMapReady)="onMapReady($event)">
          </div>
        </div>

        <!-- Lugar elegido y acceso a precios -->
        <div class="lugar-accion">
          <input type="text" id="ubicacion" name="ubicacion" class="lugar-input" placeholder="Selecciona en el mapa..."
            [(ngModel)]="evento.ubicacion" required readonly>

          <!-- Boton visible cuando ya hay un lugar elegido -->
          <button *ngIf="evento.ubicacion" type="button" class="btn-cta precios-boton" disabled>
            <i class="fa-solid fa-euro-sign"></i>
            Consultar precios
          </button>
        </div>
      </div>

      <!-- Zona para gestionar las invitaciones -->
      <div class="grupo full-width invitaciones">

        <!-- Cabecera del bloque -->
        <div class="invitaciones-header">
          <label>
            <i class="fa-solid fa-envelope-open-text"></i>
            GESTIÓN DE INVITACIONES
          </label>
          <!-- Botón para añadir invitados -->
          <button type="button" class="btn-anadir" aria-label="Añadir invitado" (click)="agregarInvitado()">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>

        <!-- Mensaje si aun no hay invitados -->
        <div *ngIf="emailsInvitados.length === 0" class="empty-state-box invitaciones-empty">
          <i class="fa-solid fa-users"></i>
          No has añadido invitados aún. Pulsa el botón <b>+</b> para empezar.
        </div>

        <!-- Lista de invitados añadidos -->
        <div class="lista-invitados">

          <!-- Recorre cada invitado añadido -->
          <div *ngFor="let invitado of emailsInvitados; let i = index">

            <div class="fila-invitado">

              <!-- Campo para el email -->
              <div class="email-contenedor">
                <i class="fa-solid fa-envelope email-icon"></i>

                <input type="text" placeholder="correo@ejemplo.com" [(ngModel)]="invitado.email"
                  [name]="'invitado' + i">
              </div>

              <!-- Boton para quitar al invitado -->
              <button type="button" class="btn-quitar" aria-label="Quitar invitado" (click)="quitarInvitado(i)">
                <i class="fa-solid fa-trash-can"></i>
              </button>

            </div>
          </div>

        </div>
      </div>

      <!-- Mensaje cuando todo sale bien -->
      <div *ngIf="mensajeOk" class="alerta-ok alert-success">
        <i class="fa-solid fa-circle-check"></i>
        {{ mensajeOk }}
      </div>

      <!-- Mensaje si ocurre un error -->
      <div *ngIf="mensajeError" class="alerta-error">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ mensajeError }}
      </div>

      <!-- Botones finales del formulario -->
      <div class="acciones form-actions">
        <button type="submit" class="btn-cta">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          CREAR EVENTO
        </button>

        <a routerLink="/eventos" class="btn-secondary">
          <i class="fa-solid fa-xmark"></i>
          CANCELAR
        </a>
      </div>

    </form>
  </div>
</section>

<!-- Pie simple de la pagina -->
<section id="footer" class="simple-footer">
  <div>
    <h2>EVENT EASE</h2>
    <p>Tu celebración, perfectamente organizada.</p>
  </div>
</section>
