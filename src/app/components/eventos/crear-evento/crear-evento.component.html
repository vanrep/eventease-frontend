<!-- Seccion del formulario de creacion -->
<section class="seccion">
  <div class="contenedor">

    <!-- Formulario que llama a guardar() al enviarse -->
    <form (ngSubmit)="guardar()">

      <!-- Campo nombre del evento -->
      <div class="cabecera">
        <div class="grupo ancho-completo">
          <label><i class="fa-solid fa-pen-nib"></i> NOMBRE DEL EVENTO</label>
          <input type="text" id="titulo" name="titulo"
                 placeholder="Ej: Gran Gala de Aniversario"
                 [(ngModel)]="evento.titulo" required>
        </div>
      </div>

      <!-- Campo descripcion del evento -->
      <div class="grupo ancho-completo separador">
        <label><i class="fa-solid fa-align-left"></i> DESCRIPCIÓN DEL EVENTO</label>
        <textarea id="descripcion" name="descripcion"
                  placeholder="Escribe aquí todos los detalles de tu celebración..."
                  [(ngModel)]="evento.descripcion" rows="4"></textarea>
      </div>

      <!-- Campos de fecha y capacidad en dos columnas -->
      <div class="grid">

        <!-- Selector de fecha y hora -->
        <div class="grupo info-card">
          <label for="fecha"><i class="fa-solid fa-calendar-check"></i> ¿CUÁNDO SERÁ?</label>
          <input type="datetime-local" id="fecha" name="fecha"
                 [(ngModel)]="evento.fecha" required class="info-input">
        </div>

        <!-- Numero maximo de asistentes -->
        <div class="grupo info-card">
          <label for="capacidad"><i class="fa-solid fa-users-line"></i> ¿CUÁNTOS ASISTIRÁN?</label>
          <input type="number" id="capacidad" name="capacidad"
                 [(ngModel)]="evento.capacidad" placeholder="Ej: 50" required class="info-input">
        </div>
      </div>

      <!-- Seleccion de lugar con lista y mapa -->
      <div class="grupo ancho-completo separador">
        <label><i class="fa-solid fa-map-location-dot"></i> SELECCIÓN DE LUGAR</label>

        <div class="seleccion-lugares">

          <!-- Lista de lugares disponibles, uno se resalta al seleccionarlo -->
          <div class="lista-lugares">
            <div class="lugar-item"
                 *ngFor="let lugar of lugares"
                 [class.selected]="lugarSeleccionado?.id === lugar.id"
                 (click)="seleccionarLugar(lugar)">
              <h4>{{ lugar.nombre }}</h4>
              <p>{{ lugar.direccion }}</p>
            </div>
          </div>

          <!-- Mapa interactivo de Leaflet -->
          <div class="mapa"
               leaflet
               [leafletOptions]="options"
               (leafletMapReady)="onMapReady($event)">
          </div>
        </div>

        <!-- Campo que muestra la ubicacion elegida en el mapa (solo lectura) -->
        <div class="lugar-accion">
          <input type="text" id="ubicacion" name="ubicacion"
                 [(ngModel)]="evento.ubicacion"
                 placeholder="Selecciona en el mapa..." required readonly
                 class="lugar-input">

          <!-- Boton de consulta de precios, visible solo si hay ubicacion seleccionada -->
          <button *ngIf="evento.ubicacion" type="button" class="btn-cta precios-boton" disabled>
            <i class="fa-solid fa-euro-sign"></i> Consultar precios
          </button>
        </div>
      </div>

      <!-- Seccion de invitados -->
      <div class="grupo ancho-completo invitaciones">
        <div class="invitaciones-header">
          <label><i class="fa-solid fa-envelope-open-text"></i> GESTIÓN DE INVITACIONES</label>
          <!-- Boton para añadir un nuevo invitado -->
          <button type="button" (click)="agregarInvitado()" class="btn-anadir">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>

          <!-- Estado inicial sin invitados -->
          <div *ngIf="emailsInvitados.length === 0" class="empty-state-box" style="margin: 20px 0;">
            <i class="fa-solid fa-users"></i>
            No has añadido invitados aún. Pulsa el botón <b>+</b> para empezar.
          </div>

        <!-- Recorremos la lista de invitados con email y boton de eliminar -->
        <div class="lista-invitados">
          <div *ngFor="let invitado of emailsInvitados; let i = index">
            <div class="fila-invitado">
              <div class="email-contenedor">
                <i class="fa-solid fa-envelope email-icon"></i>
                <!-- Borde rojo si el email tiene error -->
                <input type="email" [(ngModel)]="invitado.email" [name]="'invitado' + i"
                       placeholder="correo@ejemplo.com"
                       [style.border-color]="invitado.error ? '#EF4444' : ''">
              </div>
              <!-- Boton para quitar este invitado -->
              <button type="button" (click)="quitarInvitado(i)" class="btn-quitar">
                <i class="fa-solid fa-trash-can"></i>
              </button>
            </div>
            <!-- Mensaje de error del email del invitado -->
            <p *ngIf="invitado.error" class="error-invitado">
              <i class="fa-solid fa-circle-exclamation"></i> {{ invitado.error }}
            </p>
          </div>
        </div>
      </div>

      <!-- Mensaje de exito tras guardar -->
      <div *ngIf="mensajeOk" class="alerta-ok">
        <i class="fa-solid fa-circle-check"></i> {{ mensajeOk }}
      </div>
      <!-- Mensaje de error si algo falla -->
      <div *ngIf="mensajeError" class="alerta-error">
        <i class="fa-solid fa-circle-exclamation"></i> {{ mensajeError }}
      </div>

      <!-- Botones de enviar y cancelar -->
      <div class="acciones">
        <button type="submit" class="btn-cta">
          <i class="fa-solid fa-cloud-arrow-up"></i> CREAR EVENTO
        </button>
        <a routerLink="/eventos" class="btn-secondary">
          <i class="fa-solid fa-xmark"></i> CANCELAR
        </a>
      </div>

    </form>
  </div>
</section>

<!-- Cierre visual de la pagina -->
<section id="footer" class="simple-footer">
  <div>
    <h2>EVENT EASE</h2>
    <p>Tu celebración, perfectamente organizada.</p>
  </div>
</section>
