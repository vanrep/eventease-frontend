<!-- Página de creación de evento -->
<section class="seccion page-section">
  <div class="contenedor page-card">

    <!-- Formulario principal -->
    <form (ngSubmit)="guardar()">

      <!-- Nombre del evento -->
      <div class="cabecera">
        <div class="grupo ancho-completo full-width">
          <label for="titulo">
            <i class="fa-solid fa-pen-nib"></i>
            NOMBRE DEL EVENTO
          </label>

          <input
            type="text"
            id="titulo"
            name="titulo"
            placeholder="Ej: Gran Gala de Aniversario"
            [(ngModel)]="evento.titulo"
            required>
        </div>
      </div>

      <!-- Descripción del evento -->
      <div class="grupo ancho-completo full-width separador section-gap">
        <label for="descripcion">
          <i class="fa-solid fa-align-left"></i>
          DESCRIPCIÓN DEL EVENTO
        </label>

        <textarea
          id="descripcion"
          name="descripcion"
          placeholder="Escribe aquí todos los detalles de tu celebración..."
          [(ngModel)]="evento.descripcion"
          rows="4">
        </textarea>
      </div>

      <!-- Fecha y capacidad -->
      <div class="grid form-grid">

        <!-- Fecha y hora -->
        <div class="grupo form-group info-card">
          <label for="fecha">
            <i class="fa-solid fa-calendar-check"></i>
            ¿CUÁNDO SERÁ?
          </label>

          <input
            type="datetime-local"
            id="fecha"
            name="fecha"
            class="info-input"
            [(ngModel)]="evento.fecha"
            required>
        </div>

        <!-- Capacidad -->
        <div class="grupo form-group info-card">
          <label for="capacidad">
            <i class="fa-solid fa-users-line"></i>
            ¿CUÁNTOS ASISTIRÁN?
          </label>

          <input
            type="number"
            id="capacidad"
            name="capacidad"
            class="info-input"
            placeholder="Ej: 50"
            [(ngModel)]="evento.capacidad"
            required>
        </div>

      </div>

      <!-- Selección de lugar -->
      <div class="grupo ancho-completo full-width separador section-gap">
        <label>
          <i class="fa-solid fa-map-location-dot"></i>
          SELECCIÓN DE LUGAR
        </label>

        <div class="seleccion-lugares">

          <!-- Lista de lugares -->
          <div class="lista-lugares">
            <div
              class="lugar-item"
              *ngFor="let lugar of lugares"
              [class.selected]="lugarSeleccionado?.id === lugar.id"
              (click)="seleccionarLugar(lugar)">

              <h4>{{ lugar.nombre }}</h4>
              <p>{{ lugar.direccion }}</p>
            </div>
          </div>

          <!-- Mapa -->
          <div
            class="mapa contenedor-mapa"
            leaflet
            [leafletOptions]="options"
            (leafletMapReady)="onMapReady($event)">
          </div>

        </div>

        <!-- Ubicación seleccionada -->
        <div class="lugar-accion">
          <input
            type="text"
            id="ubicacion"
            name="ubicacion"
            class="lugar-input"
            placeholder="Selecciona en el mapa..."
            [(ngModel)]="evento.ubicacion"
            required
            readonly>

          <!-- Botón informativo de precios -->
          <button
            *ngIf="evento.ubicacion"
            type="button"
            class="btn-cta precios-boton"
            disabled>
            <i class="fa-solid fa-euro-sign"></i>
            Consultar precios
          </button>
        </div>
      </div>

      <!-- Invitaciones -->
      <div class="grupo ancho-completo full-width invitaciones">

        <!-- Cabecera de invitaciones -->
        <div class="invitaciones-header">
          <label>
            <i class="fa-solid fa-envelope-open-text"></i>
            GESTIÓN DE INVITACIONES
          </label>

          <button
            type="button"
            class="btn-anadir"
            aria-label="Añadir invitado"
            (click)="agregarInvitado()">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>

        <!-- Estado vacío -->
        <div *ngIf="emailsInvitados.length === 0" class="empty-state-box invitaciones-empty">
          <i class="fa-solid fa-users"></i>
          No has añadido invitados aún. Pulsa el botón <b>+</b> para empezar.
        </div>

        <!-- Lista de invitados -->
        <div class="lista-invitados">

          <div *ngFor="let invitado of emailsInvitados; let i = index">

            <div class="fila-invitado">

              <!-- Email del invitado -->
              <div class="email-contenedor">
                <i class="fa-solid fa-envelope email-icon"></i>

                <input
                  type="email"
                  placeholder="correo@ejemplo.com"
                  [(ngModel)]="invitado.email"
                  [name]="'invitado' + i"
                  [style.border-color]="invitado.error ? '#EF4444' : ''">
              </div>

              <!-- Eliminar invitado -->
              <button
                type="button"
                class="btn-quitar"
                aria-label="Quitar invitado"
                (click)="quitarInvitado(i)">
                <i class="fa-solid fa-trash-can"></i>
              </button>

            </div>

            <!-- Error del invitado -->
            <p *ngIf="invitado.error" class="error-invitado">
              <i class="fa-solid fa-circle-exclamation"></i>
              {{ invitado.error }}
            </p>

          </div>

        </div>
      </div>

      <!-- Mensaje de éxito -->
      <div *ngIf="mensajeOk" class="alerta-ok alert-success">
        <i class="fa-solid fa-circle-check"></i>
        {{ mensajeOk }}
      </div>

      <!-- Mensaje de error -->
      <div *ngIf="mensajeError" class="alerta-error alert-error">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ mensajeError }}
      </div>

      <!-- Acciones finales -->
      <div class="acciones form-actions">
        <button type="submit" class="btn-cta">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          CREAR EVENTO
        </button>

        <a routerLink="/eventos" class="btn-secondary">
          <i class="fa-solid fa-xmark"></i>
          CANCELAR
        </a>
      </div>

    </form>
  </div>
</section>

<!-- Footer simple de la página -->
<section id="footer" class="simple-footer">
  <div>
    <h2>EVENT EASE</h2>
    <p>Tu celebración, perfectamente organizada.</p>
  </div>
</section>
