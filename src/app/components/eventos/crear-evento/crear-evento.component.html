<div class="container" style="max-width: 600px; margin-top: 2rem;">
  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h2 style="margin: 0;">Crear Nuevo Evento</h2>
      <a routerLink="/eventos" class="btn btn-outline">Volver</a>
    </div>
    
    <form (ngSubmit)="guardar()">
      <div class="form-group">
        <label for="titulo">Título del Evento</label>
        <input type="text" id="titulo" name="titulo" class="form-control" [(ngModel)]="evento.titulo" required>
      </div>

      <div class="form-group">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" name="descripcion" class="form-control" [(ngModel)]="evento.descripcion" rows="3" required></textarea>
      </div>

      <div class="form-group">
        <label for="fecha">Fecha y Hora</label>
        <input type="datetime-local" id="fecha" name="fecha" class="form-control" [(ngModel)]="evento.fecha" required>
      </div>

      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem;">
        <div class="form-group">
          <label for="ubicacion">Ubicación</label>
          <input type="text" id="ubicacion" name="ubicacion" class="form-control" [(ngModel)]="evento.ubicacion" required>
        </div>

        <div class="form-group">
          <label for="capacidad">Capacidad</label>
          <input type="number" id="capacidad" name="capacidad" class="form-control" [(ngModel)]="evento.capacidad" required min="1">
        </div>
      </div>

      <div style="margin-top: 1.5rem;">
        <button type="submit" class="btn btn-primary" style="width: 100%;">Crear Evento</button>
      </div>
    </form>

    <div *ngIf="mensajeOk" class="alert-success" style="margin-top: 1rem;">
      {{ mensajeOk }}
    </div>
    <div *ngIf="mensajeError" class="alert-danger" style="margin-top: 1rem;">
      {{ mensajeError }}
    </div>
  </div>
</div>
