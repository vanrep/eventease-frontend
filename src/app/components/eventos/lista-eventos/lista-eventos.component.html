<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h2>Mis Eventos</h2>
    <a routerLink="/eventos/crear" class="btn btn-primary">Crear Nuevo Evento</a>
  </div>

  <div *ngIf="mensajeError" class="alert-danger" style="margin-bottom: 2rem;">
    {{ mensajeError }}
  </div>

  <div *ngIf="eventos.length === 0 && !mensajeError" class="card text-center" style="padding: 3rem;">
    <p class="text-muted" style="margin-bottom: 1rem;">No has creado ningún evento todavía.</p>
    <a routerLink="/eventos/crear" class="btn btn-primary">Empieza creando uno</a>
  </div>

  <div class="events-grid" *ngIf="eventos.length > 0">
    <div class="card event-card" *ngFor="let evento of eventos">
      <div class="event-card-header">
        <h3>{{ evento.titulo }}</h3>
        <span class="event-date">{{ evento.fecha }}</span>
      </div>
      
      <div class="event-card-body">
        <p class="event-desc">{{ evento.descripcion }}</p>
        
        <div class="event-details">
          <div class="detail-item">
            <strong>Ubicación:</strong> {{ evento.ubicacion }}
          </div>
          <div class="detail-item">
            <strong>Capacidad:</strong> {{ evento.capacidad }} personas
          </div>
        </div>
      </div>
      
      <div class="event-card-footer">
        <a [routerLink]="['/eventos', evento.id]" class="btn btn-outline" style="width: 100%;">Gestionar Evento</a>
      </div>
    </div>
  </div>
</div>
