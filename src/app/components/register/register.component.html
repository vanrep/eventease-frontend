<!-- Pagina de registro -->
<section class="form-wrapper register-wrapper">
  <div class="auth-card">

    <!-- Cabecera del formulario -->
    <div class="auth-header">
      <img src="/assets/images/Logo_EventEase.jpg" alt="Logo de EventEase" class="form-logo register-logo">
      <h1>CREAR CUENTA</h1>
      <p>Empieza a organizar y vivir tus eventos</p>
    </div>

    <!-- Formulario principal -->
    <form (ngSubmit)="registrar()" #registerForm="ngForm">

      <!-- Campo del email -->
      <div class="form-group">
        <label for="email">
          <i class="fa-solid fa-envelope"></i>
          CORREO ELECTRÓNICO
          <span class="obligatorio ">*</span>
        </label>

        <div class="input-with-icon">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="tu@email.com"
            [(ngModel)]="usuario.email"
            required>
        </div>
      </div>

      <!-- Bloque de contraseña -->
      <div class="fila-contrasena password-grid">

        <!-- Campo de la contraseña -->
        <div class="form-group">
          <label for="password">
            <i class="fa-solid fa-lock"></i>
            CONTRASEÑA
            <span class="obligatorio ">*</span>
          </label>

          <div class="input-with-icon">
            <input
              [type]="mostrarPassword ? 'text' : 'password'"
              id="password"
              name="password"
              placeholder="Elige una contraseña"
              [(ngModel)]="usuario.password"
              required>

            <button
              *ngIf="usuario.password"
              type="button"
              class="visibilidad-password-btn password-toggle-btn"
              (mousedown)="$event.preventDefault()"
              (click)="$event.preventDefault(); toggleMostrarPassword()"
              [attr.aria-label]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
              <i class="fa-solid" [ngClass]="mostrarPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>
          </div>
        </div>

        <!-- Campo de confirmar contraseña -->
        <div class="form-group">
          <label for="confirmarPassword">
            <i class="fa-solid fa-lock"></i>
            CONFIRMA TU CONTRASEÑA
            <span class="obligatorio ">*</span>
          </label>

          <div class="input-with-icon">
            <input
              [type]="mostrarConfirmacion ? 'text' : 'password'"
              id="confirmarPassword"
              name="confirmarPassword"
              placeholder="Confirma tu contraseña"
              [(ngModel)]="confirmarPassword"
              required>

            <button
              *ngIf="confirmarPassword"
              type="button"
              class="visibilidad-password-btn password-toggle-btn"
              (mousedown)="$event.preventDefault()"
              (click)="$event.preventDefault(); toggleMostrarConfirmacion()"
              [attr.aria-label]="mostrarConfirmacion ? 'Ocultar contraseña' : 'Mostrar contraseña'">
              <i class="fa-solid" [ngClass]="mostrarConfirmacion ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>
          </div>
        </div>

      </div>

  <!-- Muestra si las contraseñas no coinciden -->
      <div *ngIf="confirmarPassword && !passwordsCoinciden()" class="alerta-error password-error">
        <i class="fa-solid fa-circle-exclamation"></i>
        Las contraseñas no coinciden
      </div>

      <!-- Linea separadora -->
      <hr class="form-divider">

      <!-- Campo opcional del nombre -->
      <div class="form-group">
        <label for="nombre">
          <i class="fa-solid fa-user"></i>
          NOMBRE COMPLETO
        </label>

        <div class="input-with-icon">
          <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Tu nombre completo"
            [(ngModel)]="usuario.nombre">
        </div>
      </div>

      <!-- Muestra el mensaje ok -->
      <div *ngIf="mensajeOk" class="alerta-ok">
        <i class="fa-solid fa-circle-check"></i>
        {{ mensajeOk }}
      </div>

      <!-- Muestra el mensaje de error -->
      <div *ngIf="mensajeError" class="alerta-error animacion-shake">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ mensajeError }}
      </div>

      <!-- Boton de registrar -->
      <div class="form-actions auth-actions">
        <button
          id="btn-submit"
          type="submit"
          class="btn-cta"
          [disabled]="!registerForm.valid || !passwordsCoinciden()">
          REGISTRAR
          <i class="fa-solid fa-user-plus"></i>
        </button>
      </div>

      <!-- Enlace al login -->
      <p class="auth-switch-text">
        ¿Ya tienes cuenta con nosotros?
        <a routerLink="/login">Iniciar sesión</a>
      </p>

    </form>
  </div>
</section>
