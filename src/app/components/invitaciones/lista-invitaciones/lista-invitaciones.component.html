<section class="invitaciones-page">

  <!-- Muestra un aviso cuando falla la carga o la respuesta de invitaciones -->
  <div *ngIf="mensajeError" class="error-alert">
    <i class="fa-solid fa-circle-exclamation"></i> {{ mensajeError }}
  </div>

  <div class="invitaciones-card">

    <!-- Cabecera principal de la pagina -->
    <h1 class="invitaciones-title">
      <i class="fa-solid fa-envelope-open-text"></i> MIS INVITACIONES
    </h1>

    <!-- Estado vacio cuando no hay invitaciones para mostrar -->
    <div *ngIf="invitaciones.length === 0 && !mensajeError" class="empty-box">
      <i class="fa-solid fa-inbox" style="font-size: 2rem; margin-bottom: 15px; display: block;"></i>
      No tienes invitaciones.
    </div>

    <!-- Tabla principal con el detalle y las acciones disponibles -->
    <table class="invitaciones-table" *ngIf="invitaciones.length > 0">
      <thead>
        <tr>
          <th>Evento</th>
          <th>Fecha</th>
          <th>Ubicación</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let inv of invitaciones">

          <td>
            <strong>{{ inv.eventoTitulo }}</strong>
          </td>

          <td>
            {{ inv.eventoFecha | date:'dd/MM/yyyy HH:mm' }}
          </td>

          <td>
            <i class="fa-solid fa-map-location-dot" [title]="inv.eventoUbicacion"></i>
          </td>

          <td>
            <span class="badge-status pendiente" *ngIf="inv.estado === 'PENDIENTE'">
              <i class="fa-solid fa-clock"></i> Pendiente
            </span>

            <span class="badge-status aceptada" *ngIf="inv.estado === 'ACEPTADA'">
              <i class="fa-solid fa-circle-check"></i> Aceptada
            </span>

            <span class="badge-status rechazada" *ngIf="inv.estado === 'RECHAZADA'">
              <i class="fa-solid fa-circle-xmark"></i> Rechazada
            </span>
          </td>

          <td>
            <div class="acciones" *ngIf="inv.estado === 'PENDIENTE' || inv.estado === 'NUEVA'; else sinAcciones">
              <button type="button" class="btn-accion btn-aceptar" (click)="responder(inv.eventoId, true)">
                <i class="fa-solid fa-circle-check"></i> Aceptar
              </button>

              <button type="button" class="btn-accion btn-rechazar" (click)="responder(inv.eventoId, false)">
                <i class="fa-solid fa-circle-xmark"></i> Rechazar
              </button>
            </div>

            <ng-template #sinAcciones>
              <span>Sin acciones</span>
            </ng-template>
          </td>

        </tr>
      </tbody>
    </table>

  </div>

</section>
