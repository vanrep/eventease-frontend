<!-- Página de error 404 -->
<section class="seccion error-pagina-page">
  <div class="contenedor error-pagina-card">

    <!-- Código del error -->
    <span class="error-pagina-code">404</span>

    <!-- Mensaje principal -->
    <h1 class="error-pagina-title">
      Esta página no existe
    </h1>

    <!-- Explicación breve -->
    <p class="error-pagina-texto">
      La página que intentas abrir no existe, no está disponible todavía,
      o ya no forma parte de EventEase.
    </p>

    <!-- Acción para volver -->
    <a routerLink="/inicio" class="btn-cta error-pagina-cta">
      Volver al inicio
    </a>

  </div>

</section>
